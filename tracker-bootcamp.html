// ── STATE ────────────────────────────────────────────────────────
const KEY = 'bc_state';
function gs(){try{return JSON.parse(localStorage.getItem(KEY)||'{}');}catch(e){return{};}}
function ss(s){localStorage.setItem(KEY,JSON.stringify(s));}
function getChk(tab,sec,idx,f){const v=gs()[`${tab}_${sec}_${idx}_${f}`];return v??null;}
function setChk(tab,sec,idx,f,v){const s=gs();s[`${tab}_${sec}_${idx}_${f}`]=v;ss(s);}

// ── PROGRESS ─────────────────────────────────────────────────────
function calcSectionPct(tabId, secIdx, items) {
  let total=0,done=0;
  items.forEach((item,idx)=>{
    ['lec','anki'].forEach(f=>{
      total++;
      const v=getChk(tabId,secIdx,idx,f);
      if((v!==null?v:item[f]))done++;
    });
  });
  return total?{pct:Math.round(done/total*100),done,total}:{pct:0,done:0,total:0};
}
function calcTabPct(tab) {
  let total=0,done=0;
  tab.sections.forEach((sec,si)=>{
    sec.items.forEach((item,idx)=>{
      ['lec','anki'].forEach(f=>{
        total++;
        const v=getChk(tab.id,si,idx,f);
        if((v!==null?v:item[f]))done++;
      });
    });
  });
  return total?{pct:Math.round(done/total*100),done,total}:{pct:0,done:0,total:0};
}
function calcOverall() {
  let total=0,done=0;
  TABS.forEach(tab=>{
    const r=calcTabPct(tab);total+=r.total;done+=r.done;
  });
  return total?{pct:Math.round(done/total*100),done,total}:{pct:0,done:0,total:0};
}
function refreshOverall(){
  const r=calcOverall();
  document.getElementById('overall-pct').textContent=r.pct+'%';
  document.getElementById('overall-bar').style.width=r.pct+'%';
  document.getElementById('overall-label').textContent=`${r.done} of ${r.total} items checked`;
}

// ── RENDER ───────────────────────────────────────────────────────
function renderTabs(){
  const strip=document.getElementById('tab-strip');
  strip.innerHTML=TABS.map((t,i)=>
    `<button class="ts-btn${i===0?' active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function renderPanels(){
  const container=document.getElementById('panels');
  container.innerHTML=TABS.map((tab,ti)=>`
    <div class="tab-panel${ti===0?' active':''}" id="panel-${tab.id}">
      ${tab.sections.map((sec,si)=>renderSection(tab,si,sec)).join('')}
    </div>
  `).join('');
}

function renderSection(tab,si,sec){
  const r=calcSectionPct(tab.id,si,sec.items);
  const secId=`sec-${tab.id}-${si}`;
  const items=sec.items.map((item,idx)=>{
    const lv=getChk(tab.id,si,idx,'lec');const lecOn=(lv!==null?lv:item.lec);
    const av=getChk(tab.id,si,idx,'anki');const ankiOn=(av!==null?av:item.anki);
    return `<div class="t-item">
      <span class="t-name">${item.n}</span>
      ${item.dur&&item.dur!=='—'?`<span class="t-duration">${item.dur}</span>`:''}
      <div class="check-grp">
        <div class="check-col">
          <span class="check-lbl">Lec</span>
          <div class="chk${lecOn?' on':''}" onclick="toggle('${tab.id}',${si},${idx},'lec',this,'${secId}')"></div>
        </div>
        <div class="check-col">
          <span class="check-lbl">Anki</span>
          <div class="chk${ankiOn?' on':''}" onclick="toggle('${tab.id}',${si},${idx},'anki',this,'${secId}')"></div>
        </div>
      </div>
    </div>`;
  }).join('');
  return `<div class="section-card" id="${secId}">
    <div class="section-card-header" onclick="toggleSection('${secId}')">
      <span class="section-card-title">${sec.title}</span>
      <div class="section-card-meta">
        <span class="section-pct" id="${secId}-pct">${r.pct}%</span>
        ${tab.dur?`<span class="section-duration">${tab.sections.length===1?tab.dur:''}</span>`:''}
        <span class="section-chevron" id="${secId}-chev">▼</span>
      </div>
    </div>
    <div class="section-card-body">
      <div class="section-mini-bar"><div class="section-mini-bar-fill" id="${secId}-bar" style="width:${r.pct}%"></div></div>
      ${items}
    </div>
  </div>`;
}

function toggle(tabId,si,idx,f,el,secId){
  const on=!el.classList.contains('on');
  el.classList.toggle('on',on);
  setChk(tabId,si,idx,f,on);
  // Update section bar
  const tab=TABS.find(t=>t.id===tabId);
  if(tab){
    const r=calcSectionPct(tabId,si,tab.sections[si].items);
    const pctEl=document.getElementById(secId+'-pct');
    const barEl=document.getElementById(secId+'-bar');
    if(pctEl)pctEl.textContent=r.pct+'%';
    if(barEl)barEl.style.width=r.pct+'%';
  }
  refreshOverall();
}

function toggleSection(secId){
  const card=document.getElementById(secId);
  card.classList.toggle('open');
}

function switchTab(id){
  document.querySelectorAll('.ts-btn').forEach(b=>b.classList.toggle('active',b.textContent===TABS.find(t=>t.id===id).label));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
}

// INIT
renderTabs();renderPanels();refreshOverall();
// Auto-open first section of active tab
document.querySelector('.section-card')?.classList.add('open');
</script>
</body>
</html>
