// ── PROGRESS ────────────────────────────────────────────────────────
function calcSubject(subj) {
  let total=0, done=0;
  subj.sections.forEach((sec,si) => sec.items.forEach((item,idx) => {
    ['lec','anki'].forEach(f => {
      total++;
      const v = getChk(subj.id, si, idx, f);
      if ((v !== null ? v : item[f])) done++;
    });
  }));
  return { pct: total ? Math.round(done/total*100) : 0, done, total };
}
function calcOverall() {
  let total=0, done=0;
  SUBJECTS.forEach(s => { const r=calcSubject(s); total+=r.total; done+=r.done; });
  return { pct: total ? Math.round(done/total*100) : 0, done, total };
}
function refreshOverall() {
  const r = calcOverall();
  document.getElementById('overall-pct').textContent   = r.pct + '%';
  document.getElementById('overall-bar').style.width   = r.pct + '%';
  document.getElementById('overall-label').textContent = `${r.done} of ${r.total} items checked`;
}

// ── RENDER ───────────────────────────────────────────────────────────
function buildAll() {
  document.getElementById('subjects').innerHTML = SUBJECTS.map(subj => {
    const r = calcSubject(subj);
    const bodyHTML = subj.sections.map((sec, si) => {
      const rows = sec.items.map((item, idx) => {
        const lecOn  = getChk(subj.id, si, idx, 'lec')  ?? item.lec;
        const ankiOn = getChk(subj.id, si, idx, 'anki') ?? item.anki;
        const dur = item.dur ? `<span class="t-duration">${item.dur}</span>` : '';
        return `<div class="t-item">
          <span class="t-name">${item.n}</span>${dur}
          <div class="check-grp">
            <div class="check-col"><span class="check-lbl">Lec</span>
              <div class="chk${lecOn?' on':''}" onclick="tog('${subj.id}',${si},${idx},'lec',this)"></div></div>
            <div class="check-col"><span class="check-lbl">Anki</span>
              <div class="chk${ankiOn?' on':''}" onclick="tog('${subj.id}',${si},${idx},'anki',this)"></div></div>
          </div></div>`;
      }).join('');
      const secTitle = sec.title ? `<div class="sub-section-title">${sec.title}</div>` : '';
      return `<div class="sub-section">${secTitle}${rows}</div>`;
    }).join('');

    return `<div class="subject-block" id="sb-${subj.id}">
      <div class="subject-header" onclick="toggle('${subj.id}')">
        <span class="subject-title">${subj.title}</span>
        <div class="subject-meta">
          <span class="subject-dur">⏱ ${subj.dur}</span>
          <div class="subj-bar-wrap"><div class="subj-bar-fill" id="bar-${subj.id}" style="width:${r.pct}%"></div></div>
          <span class="subject-pct" id="pct-${subj.id}">${r.pct}%</span>
          <span class="subject-chevron">▼</span>
        </div>
      </div>
      <div class="subject-body">${bodyHTML}</div>
    </div>`;
  }).join('');
}

function toggle(id) { document.getElementById('sb-'+id).classList.toggle('open'); }

function tog(sid, si, idx, f, el) {
  const on = !el.classList.contains('on');
  el.classList.toggle('on', on);
  setChk(sid, si, idx, f, on);
  const subj = SUBJECTS.find(s => s.id === sid);
  if (subj) {
    const r = calcSubject(subj);
    document.getElementById('pct-'+sid).textContent = r.pct + '%';
    document.getElementById('bar-'+sid).style.width = r.pct + '%';
  }
  refreshOverall();
}

// Seed all defaults into localStorage on first visit so home page can read them
function initStorage() {
  const state = gs();
  let dirty = false;
  SUBJECTS.forEach(subj => {
    subj.sections.forEach((sec, si) => {
      sec.items.forEach((item, idx) => {
        ['lec','anki'].forEach(f => {
          const k = `${subj.id}_${si}_${idx}_${f}`;
          if (!(k in state)) { state[k] = item[f]; dirty = true; }
        });
      });
    });
  });
  if (dirty) ss(state);
}

initStorage();
buildAll();
refreshOverall();
