const KEY = 'sk_micro_state';
function gs(){{try{{return JSON.parse(localStorage.getItem(KEY)||'{{}}')}catch(e){{return{{}}}}}}
function ss(s){{localStorage.setItem(KEY,JSON.stringify(s))}}
function getChk(sid,si,idx,f){{const v=gs()[sid+'_'+si+'_'+idx+'_'+f];return v??null}}
function setChk(sid,si,idx,f,v){{const s=gs();s[sid+'_'+si+'_'+idx+'_'+f]=v;ss(s)}}

function calcSubject(subj){{
  let total=0,done=0;
  subj.sections.forEach((sec,si)=>sec.items.forEach((item,idx)=>{{
    ['lec','anki'].forEach(f=>{{total++;const v=getChk(subj.id,si,idx,f);if((v!==null?v:item[f]))done++;}});
  }}));
  return{{pct:total?Math.round(done/total*100):0,done,total}};
}}
function calcOverall(){{
  let total=0,done=0;
  SUBJECTS.forEach(s=>{{const r=calcSubject(s);total+=r.total;done+=r.done;}});
  return{{pct:total?Math.round(done/total*100):0,done,total}};
}}
function refreshOverall(){{
  const r=calcOverall();
  document.getElementById('overall-pct').textContent=r.pct+'%';
  document.getElementById('overall-bar').style.width=r.pct+'%';
  document.getElementById('overall-label').textContent=r.done+' of '+r.total+' items checked';
}}
function refreshSubject(sid){{
  const subj=SUBJECTS.find(s=>s.id===sid);
  if(!subj)return;
  const r=calcSubject(subj);
  document.getElementById('pct-'+sid).textContent=r.pct+'%';
  document.getElementById('bar-'+sid).style.width=r.pct+'%';
}}

function buildAll(){{
  document.getElementById('subjects').innerHTML=SUBJECTS.map(subj=>{{
    const r=calcSubject(subj);
    const body=subj.sections.map((sec,si)=>{{
      const allIds={{lec:`all-lec-${{subj.id}}-${{si}}`,anki:`all-anki-${{subj.id}}-${{si}}`}};
      // compute check-all state
      function secAllOn(f){{return sec.items.every((item,idx)=>{{const v=getChk(subj.id,si,idx,f);return(v!==null?v:item[f]);}});}}
      const rows=sec.items.map((item,idx)=>{{
        const lecOn=getChk(subj.id,si,idx,'lec')??item.lec;
        const ankiOn=getChk(subj.id,si,idx,'anki')??item.anki;
        const dur=item.dur?`<span class="t-duration">${{item.dur}}</span>`:'';
        return `<div class="t-item">
          <span class="t-name">${{item.n}}</span>${{dur}}
          <div class="check-grp">
            <div class="check-col"><span class="check-lbl">Lec</span>
              <div class="chk${{lecOn?' on':''}}" onclick="tog('${{subj.id}}',${{si}},${{idx}},'lec',this)"></div></div>
            <div class="check-col"><span class="check-lbl">Anki</span>
              <div class="chk${{ankiOn?' on':''}}" onclick="tog('${{subj.id}}',${{si}},${{idx}},'anki',this)"></div></div>
          </div></div>`;
      }}).join('');
      const secTitle=sec.title?`<div class="sub-section-title">${{sec.title}}</div>`:'';
      const allLecOn=secAllOn('lec'), allAnkiOn=secAllOn('anki');
      const checkAllBar=`<div class="check-all-bar">
        <span class="check-all-lbl">Check all</span>
        <div class="check-grp">
          <div class="check-col"><span class="check-lbl">Lec</span>
            <div class="chk check-all${{allLecOn?' on':''}}" id="all-lec-${{subj.id}}-${{si}}"
              onclick="togAll('${{subj.id}}',${{si}},'lec',this)"></div></div>
          <div class="check-col"><span class="check-lbl">Anki</span>
            <div class="chk check-all${{allAnkiOn?' on':''}}" id="all-anki-${{subj.id}}-${{si}}"
              onclick="togAll('${{subj.id}}',${{si}},'anki',this)"></div></div>
        </div></div>`;
      return `<div class="sub-section">${{secTitle}}${{checkAllBar}}${{rows}}</div>`;
    }}).join('');
    return `<div class="subject-block" id="sb-${{subj.id}}">
      <div class="subject-header" onclick="toggle('${{subj.id}}')">
        <span class="subject-title">${{subj.title}}</span>
        <div class="subject-meta">
          ${{subj.dur?`<span class="subject-dur">⏱ ${{subj.dur}}</span>`:''}}
          <div class="subj-bar-wrap"><div class="subj-bar-fill" id="bar-${{subj.id}}" style="width:${{r.pct}}%"></div></div>
          <span class="subject-pct" id="pct-${{subj.id}}">${{r.pct}}%</span>
          <span class="subject-chevron">▼</span>
        </div>
      </div>
      <div class="subject-body">${{body}}</div>
    </div>`;
  }}).join('');
}}

function toggle(id){{document.getElementById('sb-'+id).classList.toggle('open')}}

function tog(sid,si,idx,f,el){{
  const on=!el.classList.contains('on');
  el.classList.toggle('on',on);
  setChk(sid,si,idx,f,on);
  // update check-all state for this section
  const subj=SUBJECTS.find(s=>s.id===sid);
  if(subj){{
    const sec=subj.sections[si];
    const allOn=sec.items.every((_,i2)=>{{const v=getChk(sid,si,i2,f);const def=subj.sections[si].items[i2][f];return(v!==null?v:def);}});
    const allEl=document.getElementById('all-'+f+'-'+sid+'-'+si);
    if(allEl)allEl.classList.toggle('on',allOn);
  }}
  refreshSubject(sid);
  refreshOverall();
}}

function togAll(sid,si,f,el){{
  const on=!el.classList.contains('on');
  el.classList.toggle('on',on);
  const subj=SUBJECTS.find(s=>s.id===sid);
  if(!subj)return;
  const sec=subj.sections[si];
  sec.items.forEach((item,idx)=>{{
    setChk(sid,si,idx,f,on);
    // find and update individual checkbox
    const secEl=el.closest('.sub-section');
    if(secEl){{
      const items=secEl.querySelectorAll('.t-item');
      const itemEl=items[idx];
      if(itemEl){{
        const cols=itemEl.querySelectorAll('.check-col');
        const colIdx=f==='lec'?0:1;
        const chk=cols[colIdx]?.querySelector('.chk');
        if(chk)chk.classList.toggle('on',on);
      }}
    }}
  }});
  refreshSubject(sid);
  refreshOverall();
}}

function initStorage(){{
  const state=gs();let dirty=false;
  SUBJECTS.forEach(subj=>{{
    subj.sections.forEach((sec,si)=>{{
      sec.items.forEach((item,idx)=>{{
        ['lec','anki'].forEach(f=>{{
          const k=subj.id+'_'+si+'_'+idx+'_'+f;
          if(!(k in state)){{state[k]=false;dirty=true;}}
        }});
      }});
    }});
  }});
  if(dirty)ss(state);
}}

initStorage();buildAll();refreshOverall();
