  <div class="tracker-page-header">
    <h1>💉 Sketchy <em>Pharm</em></h1>
    <p>Track Anki and lecture completion for all Sketchy Pharm drug classes.</p>
  </div>

  <div class="progress-header">
    <div>
      <div class="prog-big-num" id="overall-pct">0%</div>
      <div class="prog-big-label">overall complete</div>
    </div>
    <div class="prog-bar-full">
      <div class="prog-bar-full-wrap">
        <div class="prog-bar-full-fill" id="overall-bar" style="width:0%"></div>
      </div>
      <div class="prog-bar-full-label" id="overall-label">0 of 0 items checked</div>
    </div>
  </div>

  <div class="tab-strip" id="tab-strip"></div>
  <div id="panels"></div>
</div>

<footer>Step 1 Study Hub · 🌿</footer>

<script>
const STORAGE_KEY = 'sk_pharm_state';

const DATA = {
  Antimicrobials: [
    {S:'Cell Wall & Membrane'},
    {n:'Penicillin',                                  anki:true,  lec:true},
    {n:'Nafcillin, Oxacillin, Dicloxacillin',         anki:true,  lec:true},
    {n:'Ampicillin, Amoxicillin, Piperacillin',        anki:true,  lec:true},
    {n:'Cephalosporins',                               anki:true,  lec:true},
    {n:'Monobactams and Carbapenems',                  anki:true,  lec:true},
    {n:'Vancomycin',                                   anki:true,  lec:true},
    {n:'Daptomycin',                                   anki:true,  lec:true},
    {S:'Protein Synthesis Inhibitors'},
    {n:'Tetracyclines',                                anki:true,  lec:true},
    {n:'Macrolides',                                   anki:true,  lec:true},
    {n:'Clindamycin',                                  anki:true,  lec:true},
    {n:'Chloramphenicol',                              anki:true,  lec:true},
    {n:'Linezolid',                                    anki:true,  lec:true},
    {n:'Aminoglycosides',                              anki:true,  lec:true},
    {S:'Antimycobacterials'},
    {n:'Tuberculosis Drugs',                           anki:true,  lec:true},
    {n:'Leprosy Drugs',                                anki:true,  lec:true},
    {S:'Other Antibiotics'},
    {n:'Trimethoprim / Sulfamethoxazole',              anki:true,  lec:true},
    {n:'Fluoroquinolones',                             anki:true,  lec:true},
    {n:'Metronidazole',                                anki:true,  lec:true},
    {S:'Antifungals'},
    {n:'Amphotericin B, Flucytosine',                  anki:true,  lec:true},
    {n:'Azoles',                                       anki:true,  lec:true},
    {n:'Griseofulvin, Terbinafine, Echinocandins',     anki:true,  lec:true},
    {S:'Antivirals — HIV'},
    {n:'NRTIs',                                        anki:false, lec:false},
    {n:'NNRTIs',                                       anki:false, lec:false},
    {n:'Protease Inhibitors',                          anki:false, lec:false},
    {n:'Maraviroc, Fusion / Integrase Inhibitors',     anki:false, lec:false},
    {S:'Antivirals — Other'},
    {n:'Acyclovir, Valacyclovir, Famciclovir',         anki:false, lec:false},
    {n:'Hepatitis C: Direct-Acting Antivirals',        anki:false, lec:false},
  ],
  Autonomic: [
    {S:'Parasympathetics'},
    {n:'Cholinomimetics / Muscarinic Agonists',        anki:false, lec:false},
    {n:'Anticholinergics (Muscarinic Antagonists)',     anki:false, lec:false},
    {n:'Acetylcholinesterase Inhibitors',              anki:false, lec:false},
    {S:'Sympathetics'},
    {n:'Adrenergic Agonists',                          anki:false, lec:false},
    {n:'Alpha Blockers',                               anki:false, lec:false},
    {n:'Beta Blockers',                                anki:false, lec:false},
  ],
  Cardiovascular: [
    {S:'Heart Failure & Diuretics'},
    {n:'Heart Failure Drugs',                          anki:false, lec:false},
    {n:'Loop, Thiazide, K-sparing Diuretics',          anki:false, lec:false},
    {S:'Antihypertensives'},
    {n:'ACE Inhibitors / ARBs',                        anki:false, lec:false},
    {n:'Calcium Channel Blockers',                     anki:false, lec:false},
    {S:'Antiarrhythmics'},
    {n:'Class I–IV Antiarrhythmics',                   anki:false, lec:false},
    {S:'Anticoagulants & Thrombolytics'},
    {n:'Heparin, Warfarin, DOACs',                     anki:false, lec:false},
    {n:'Thrombolytics',                                anki:false, lec:false},
    {S:'Dyslipidemia'},
    {n:'Statins, Fibrates, Niacin, Ezetimibe',         anki:false, lec:false},
    {S:'Vasoactive'},
    {n:'Vasoactive / Smooth Muscle Drugs',             anki:false, lec:false},
  ],
  'GI & Endocrine': [
    {S:'Gastrointestinal'},
    {n:'GI Drugs',                                     anki:false, lec:false},
    {n:'Antiemetics',                                  anki:false, lec:false},
    {S:'Diabetes'},
    {n:'Insulin & Oral Hypoglycemics',                 anki:false, lec:false},
    {S:'Thyroid / Adrenal / Pituitary'},
    {n:'Thyroid, Parathyroid, Adrenal Drugs',          anki:false, lec:false},
    {S:'Reproductive'},
    {n:'Reproductive & Endocrine Drugs',               anki:false, lec:false},
  ],
  'Neuro & Psych': [
    {S:'Neurology'},
    {n:'Neuro Drugs',                                  anki:false, lec:false},
    {S:'Sedatives / Hypnotics / Anesthetics'},
    {n:'Sedatives, Hypnotics, Analgesics',             anki:false, lec:false},
    {S:'Psychiatry'},
    {n:'Antidepressants & Anxiolytics',                anki:false, lec:false},
    {n:'Mood Stabilizers & Antiepileptics',            anki:false, lec:false},
    {n:'Antipsychotics & Parkinson Drugs',             anki:false, lec:false},
    {S:'Anti-inflammatory & Pulmonary'},
    {n:'NSAIDs, Steroids, DMARDs',                     anki:false, lec:false},
    {n:'Allergy & Pulmonary Drugs',                    anki:false, lec:false},
  ],
  Oncology: [
    {S:'Antineoplastics'},
    {n:'Sketchy Antineoplastics',                      anki:true,  lec:true},
    {n:'Antimetabolites',                              anki:false, lec:false},
    {n:'DNA & Cellular Division Drugs',                anki:false, lec:false},
    {n:'Kinase Inhibitors & Monoclonal Antibodies',    anki:false, lec:false},
  ],
};

// ── STATE ────────────────────────────────────────────────────────
function gs()  { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; } }
function ss(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
function getChk(tab, idx, f) { const v = gs()[`${tab}_${idx}_${f}`]; return v ?? null; }
function setChk(tab, idx, f, v) { const s = gs(); s[`${tab}_${idx}_${f}`] = v; ss(s); }

// ── PROGRESS ─────────────────────────────────────────────────────
function calcTabPct(tab) {
  let total = 0, done = 0;
  DATA[tab].forEach((item, idx) => {
    if (item.S) return;
    ['anki', 'lec'].forEach(f => {
      total++;
      const v = getChk(tab, idx, f);
      if ((v !== null ? v : item[f])) done++;
    });
  });
  return { pct: total ? Math.round(done / total * 100) : 0, done, total };
}

function calcOverall() {
  let total = 0, done = 0;
  Object.keys(DATA).forEach(tab => {
    const r = calcTabPct(tab); total += r.total; done += r.done;
  });
  return { pct: total ? Math.round(done / total * 100) : 0, done, total };
}

function refreshOverall() {
  const r = calcOverall();
  document.getElementById('overall-pct').textContent   = r.pct + '%';
  document.getElementById('overall-bar').style.width   = r.pct + '%';
  document.getElementById('overall-label').textContent = `${r.done} of ${r.total} items checked`;
}

// ── RENDER ───────────────────────────────────────────────────────
function buildTabs() {
  document.getElementById('tab-strip').innerHTML = Object.keys(DATA).map((tab, i) =>
    `<button class="ts-btn${i === 0 ? ' active' : ''}" onclick="switchTab('${tab}', this)">${tab}</button>`
  ).join('');
}

function buildPanel(tab) {
  const items = DATA[tab];
  let html = '';
  items.forEach((item, idx) => {
    if (item.S) { html += `<div class="t-section-title">${item.S}</div>`; return; }
    const lecOn  = (getChk(tab, idx, 'lec')  ?? item.lec);
    const ankiOn = (getChk(tab, idx, 'anki') ?? item.anki);
    html += `<div class="t-item">
      <span class="t-name">${item.n}</span>
      <div class="check-grp">
        <div class="check-col">
          <span class="check-lbl">Lec</span>
          <div class="chk${lecOn ? ' on' : ''}" onclick="tog('${tab}',${idx},'lec',this)"></div>
        </div>
        <div class="check-col">
          <span class="check-lbl">Anki</span>
          <div class="chk${ankiOn ? ' on' : ''}" onclick="tog('${tab}',${idx},'anki',this)"></div>
        </div>
      </div>
    </div>`;
  });
  return html;
}

function buildPanels() {
  document.getElementById('panels').innerHTML = Object.keys(DATA).map((tab, i) =>
    `<div class="tab-panel${i === 0 ? ' active' : ''}" id="panel-${tab.replace(/[^a-z0-9]/gi,'_')}">${buildPanel(tab)}</div>`
  ).join('');
}

function switchTab(tab, btn) {
  document.querySelectorAll('#tab-strip .ts-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#panels .tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab.replace(/[^a-z0-9]/gi,'_')).classList.add('active');
}

function tog(tab, idx, f, el) {
  const on = !el.classList.contains('on');
  el.classList.toggle('on', on);
  setChk(tab, idx, f, on);
  refreshOverall();
}

// ── INIT ─────────────────────────────────────────────────────────
buildTabs();
buildPanels();
refreshOverall();
</script>
</body>
</html>
